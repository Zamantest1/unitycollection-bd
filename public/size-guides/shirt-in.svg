<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .title{font-size:22px;font-weight:700;fill:#1f2937}
      .subtitle{font-size:13px;fill:#6b7280}
      .num{font-size:13px;fill:#1f2937;text-anchor:middle}
      .head{font-size:13px;font-weight:700;fill:#1f2937;text-anchor:middle}
      .stripe{fill:#f9fafb}
      .header-bg{fill:#dcfce7}
      .cell{fill:none;stroke:#e5e7eb;stroke-width:1}
      .footer{font-size:12px;fill:#6b7280;font-style:italic}
    </style>
  </defs>
  <rect width="720" height="540" fill="#ffffff"/>
  <text x="40" y="50" class="title">Formal shirt size guide</text>
  <text x="40" y="72" class="subtitle">All measurements in inches. Collar = around the neck.</text>

  <g transform="translate(40,100)">
    <rect x="0" y="0" width="640" height="40" class="header-bg"/>
    <text x="64" y="26" class="head">Size</text>
    <text x="192" y="26" class="head">Collar</text>
    <text x="320" y="26" class="head">Chest</text>
    <text x="448" y="26" class="head">Length</text>
    <text x="576" y="26" class="head">Sleeve</text>

    <rect x="0" y="40" width="640" height="40" class="stripe"/>
    <text x="64" y="66" class="num" font-weight="700">S</text>
    <text x="192" y="66" class="num">14.5</text>
    <text x="320" y="66" class="num">38</text>
    <text x="448" y="66" class="num">28</text>
    <text x="576" y="66" class="num">23</text>

    <text x="64" y="106" class="num" font-weight="700">M</text>
    <text x="192" y="106" class="num">15</text>
    <text x="320" y="106" class="num">40</text>
    <text x="448" y="106" class="num">29</text>
    <text x="576" y="106" class="num">23.5</text>

    <rect x="0" y="120" width="640" height="40" class="stripe"/>
    <text x="64" y="146" class="num" font-weight="700">L</text>
    <text x="192" y="146" class="num">15.5</text>
    <text x="320" y="146" class="num">42</text>
    <text x="448" y="146" class="num">30</text>
    <text x="576" y="146" class="num">24</text>

    <text x="64" y="186" class="num" font-weight="700">XL</text>
    <text x="192" y="186" class="num">16</text>
    <text x="320" y="186" class="num">44</text>
    <text x="448" y="186" class="num">31</text>
    <text x="576" y="186" class="num">24.5</text>

    <rect x="0" y="200" width="640" height="40" class="stripe"/>
    <text x="64" y="226" class="num" font-weight="700">XXL</text>
    <text x="192" y="226" class="num">17</text>
    <text x="320" y="226" class="num">46</text>
    <text x="448" y="226" class="num">32</text>
    <text x="576" y="226" class="num">25</text>

    <text x="64" y="266" class="num" font-weight="700">XXXL</text>
    <text x="192" y="266" class="num">18</text>
    <text x="320" y="266" class="num">48</text>
    <text x="448" y="266" class="num">33</text>
    <text x="576" y="266" class="num">25.5</text>

    <rect x="0" y="0" width="640" height="280" class="cell"/>
    <line x1="128" y1="0" x2="128" y2="280" stroke="#e5e7eb"/>
    <line x1="256" y1="0" x2="256" y2="280" stroke="#e5e7eb"/>
    <line x1="384" y1="0" x2="384" y2="280" stroke="#e5e7eb"/>
    <line x1="512" y1="0" x2="512" y2="280" stroke="#e5e7eb"/>
    <line x1="0" y1="40" x2="640" y2="40" stroke="#e5e7eb"/>
    <line x1="0" y1="80" x2="640" y2="80" stroke="#e5e7eb"/>
    <line x1="0" y1="120" x2="640" y2="120" stroke="#e5e7eb"/>
    <line x1="0" y1="160" x2="640" y2="160" stroke="#e5e7eb"/>
    <line x1="0" y1="200" x2="640" y2="200" stroke="#e5e7eb"/>
    <line x1="0" y1="240" x2="640" y2="240" stroke="#e5e7eb"/>
  </g>

  <text x="40" y="430" class="footer">Tip: For collar, measure around your neck where the collar normally sits, plus 0.5 inches of ease.</text>
  <text x="40" y="450" class="footer">Sleeve length is measured from shoulder seam to cuff edge.</text>
  <text x="40" y="490" class="title">Unity Collection</text>
</svg>
