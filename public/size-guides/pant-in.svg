<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .title{font-size:22px;font-weight:700;fill:#1f2937}
      .subtitle{font-size:13px;fill:#6b7280}
      .num{font-size:13px;fill:#1f2937;text-anchor:middle}
      .head{font-size:13px;font-weight:700;fill:#1f2937;text-anchor:middle}
      .stripe{fill:#f9fafb}
      .header-bg{fill:#ede9fe}
      .cell{fill:none;stroke:#e5e7eb;stroke-width:1}
      .footer{font-size:12px;fill:#6b7280;font-style:italic}
    </style>
  </defs>
  <rect width="720" height="540" fill="#ffffff"/>
  <text x="40" y="50" class="title">Pant / Trouser size guide</text>
  <text x="40" y="72" class="subtitle">All measurements in inches. Sizing assumes a standard rise.</text>

  <g transform="translate(40,100)">
    <rect x="0" y="0" width="640" height="40" class="header-bg"/>
    <text x="64" y="26" class="head">Size</text>
    <text x="192" y="26" class="head">Waist</text>
    <text x="320" y="26" class="head">Hip</text>
    <text x="448" y="26" class="head">Inseam</text>
    <text x="576" y="26" class="head">Thigh</text>

    <rect x="0" y="40" width="640" height="40" class="stripe"/>
    <text x="64" y="66" class="num" font-weight="700">28</text>
    <text x="192" y="66" class="num">28</text>
    <text x="320" y="66" class="num">36</text>
    <text x="448" y="66" class="num">40</text>
    <text x="576" y="66" class="num">21</text>

    <text x="64" y="106" class="num" font-weight="700">30</text>
    <text x="192" y="106" class="num">30</text>
    <text x="320" y="106" class="num">38</text>
    <text x="448" y="106" class="num">40</text>
    <text x="576" y="106" class="num">22</text>

    <rect x="0" y="120" width="640" height="40" class="stripe"/>
    <text x="64" y="146" class="num" font-weight="700">32</text>
    <text x="192" y="146" class="num">32</text>
    <text x="320" y="146" class="num">40</text>
    <text x="448" y="146" class="num">40</text>
    <text x="576" y="146" class="num">23</text>

    <text x="64" y="186" class="num" font-weight="700">34</text>
    <text x="192" y="186" class="num">34</text>
    <text x="320" y="186" class="num">42</text>
    <text x="448" y="186" class="num">40</text>
    <text x="576" y="186" class="num">24</text>

    <rect x="0" y="200" width="640" height="40" class="stripe"/>
    <text x="64" y="226" class="num" font-weight="700">36</text>
    <text x="192" y="226" class="num">36</text>
    <text x="320" y="226" class="num">44</text>
    <text x="448" y="226" class="num">40</text>
    <text x="576" y="226" class="num">25</text>

    <text x="64" y="266" class="num" font-weight="700">38</text>
    <text x="192" y="266" class="num">38</text>
    <text x="320" y="266" class="num">46</text>
    <text x="448" y="266" class="num">40</text>
    <text x="576" y="266" class="num">26</text>

    <rect x="0" y="0" width="640" height="280" class="cell"/>
    <line x1="128" y1="0" x2="128" y2="280" stroke="#e5e7eb"/>
    <line x1="256" y1="0" x2="256" y2="280" stroke="#e5e7eb"/>
    <line x1="384" y1="0" x2="384" y2="280" stroke="#e5e7eb"/>
    <line x1="512" y1="0" x2="512" y2="280" stroke="#e5e7eb"/>
    <line x1="0" y1="40" x2="640" y2="40" stroke="#e5e7eb"/>
    <line x1="0" y1="80" x2="640" y2="80" stroke="#e5e7eb"/>
    <line x1="0" y1="120" x2="640" y2="120" stroke="#e5e7eb"/>
    <line x1="0" y1="160" x2="640" y2="160" stroke="#e5e7eb"/>
    <line x1="0" y1="200" x2="640" y2="200" stroke="#e5e7eb"/>
    <line x1="0" y1="240" x2="640" y2="240" stroke="#e5e7eb"/>
  </g>

  <text x="40" y="430" class="footer">Tip: Waist size is the trouser's waistband measurement, not your body waist. They usually match.</text>
  <text x="40" y="450" class="footer">Inseam is from crotch seam to the inside of the cuff. Adjustable by tailor.</text>
  <text x="40" y="490" class="title">Unity Collection</text>
</svg>
