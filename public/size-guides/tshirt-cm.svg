<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .title{font-size:22px;font-weight:700;fill:#1f2937}
      .subtitle{font-size:13px;fill:#6b7280}
      .num{font-size:13px;fill:#1f2937;text-anchor:middle}
      .head{font-size:13px;font-weight:700;fill:#1f2937;text-anchor:middle}
      .stripe{fill:#f9fafb}
      .header-bg{fill:#dbeafe}
      .cell{fill:none;stroke:#e5e7eb;stroke-width:1}
      .footer{font-size:12px;fill:#6b7280;font-style:italic}
    </style>
  </defs>
  <rect width="720" height="520" fill="#ffffff"/>
  <text x="40" y="50" class="title">T-Shirt size guide</text>
  <text x="40" y="72" class="subtitle">All measurements in centimetres. Chest = full circumference.</text>

  <g transform="translate(40,100)">
    <rect x="0" y="0" width="640" height="40" class="header-bg"/>
    <text x="80" y="26" class="head">Size</text>
    <text x="240" y="26" class="head">Chest (cm)</text>
    <text x="400" y="26" class="head">Length (cm)</text>
    <text x="560" y="26" class="head">Shoulder (cm)</text>

    <rect x="0" y="40" width="640" height="40" class="stripe"/>
    <text x="80" y="66" class="num" font-weight="700">S</text>
    <text x="240" y="66" class="num">91–96</text>
    <text x="400" y="66" class="num">68.5</text>
    <text x="560" y="66" class="num">43</text>

    <text x="80" y="106" class="num" font-weight="700">M</text>
    <text x="240" y="106" class="num">96–101</text>
    <text x="400" y="106" class="num">71</text>
    <text x="560" y="106" class="num">45.5</text>

    <rect x="0" y="120" width="640" height="40" class="stripe"/>
    <text x="80" y="146" class="num" font-weight="700">L</text>
    <text x="240" y="146" class="num">101–106</text>
    <text x="400" y="146" class="num">73.5</text>
    <text x="560" y="146" class="num">48</text>

    <text x="80" y="186" class="num" font-weight="700">XL</text>
    <text x="240" y="186" class="num">106–111</text>
    <text x="400" y="186" class="num">76</text>
    <text x="560" y="186" class="num">50.5</text>

    <rect x="0" y="200" width="640" height="40" class="stripe"/>
    <text x="80" y="226" class="num" font-weight="700">XXL</text>
    <text x="240" y="226" class="num">111–116</text>
    <text x="400" y="226" class="num">78.5</text>
    <text x="560" y="226" class="num">53</text>

    <text x="80" y="266" class="num" font-weight="700">XXXL</text>
    <text x="240" y="266" class="num">116–122</text>
    <text x="400" y="266" class="num">81</text>
    <text x="560" y="266" class="num">55.5</text>

    <rect x="0" y="0" width="640" height="280" class="cell"/>
    <line x1="160" y1="0" x2="160" y2="280" stroke="#e5e7eb"/>
    <line x1="320" y1="0" x2="320" y2="280" stroke="#e5e7eb"/>
    <line x1="480" y1="0" x2="480" y2="280" stroke="#e5e7eb"/>
    <line x1="0" y1="40" x2="640" y2="40" stroke="#e5e7eb"/>
    <line x1="0" y1="80" x2="640" y2="80" stroke="#e5e7eb"/>
    <line x1="0" y1="120" x2="640" y2="120" stroke="#e5e7eb"/>
    <line x1="0" y1="160" x2="640" y2="160" stroke="#e5e7eb"/>
    <line x1="0" y1="200" x2="640" y2="200" stroke="#e5e7eb"/>
    <line x1="0" y1="240" x2="640" y2="240" stroke="#e5e7eb"/>
  </g>

  <text x="40" y="430" class="footer">Tip: Wrap the tape measure around the fullest part of your chest, parallel to the floor.</text>
  <text x="40" y="450" class="footer">For a comfortable fit, allow 2–4 cm of ease beyond your body measurement.</text>
  <text x="40" y="490" class="title">Unity Collection</text>
</svg>
